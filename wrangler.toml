name = "mirutina"
compatibility_date = "2026-03-29"
main = "worker.js"

[assets]
directory = "."
binding = "ASSETS"
run_worker_first = true

[[kv_namespaces]]
binding = "DB"
id = "405c9c9064344dcd91cb82aac6d38994"

[[r2_buckets]]
binding = "PHOTOS"
bucket_name = "mi-rutina-fotos"

# Daily meal report at 10 PM Colombia (03:00 UTC)
[triggers]
crons = ["0 3 * * *"]
